{% extends "base.html" %}

{% block title %}All Banks{% endblock %}

{% block extra_css %}
<style>
    .bank-list-card {
        max-width: 850px;
        margin: 0 auto;
        padding: 2rem;
    }

    .bank-list-card h2 {
        text-align: center;
        margin-bottom: 1.5rem;
        font-weight: 800;
        color: #2b2d42;
    }

    .bank-list {
        list-style: none;
        padding: 0;
        margin: 0;
    }

    .bank-list li {
        padding: 1rem 1.1rem;
        margin-bottom: 0.85rem;
        border: 1px solid rgba(102, 126, 234, 0.15);
        border-radius: 12px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        transition: all 0.2s ease;
        background: #fff;
    }

    .bank-list li:hover {
        background: #f8f9ff;
        transform: translateY(-2px);
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.06);
    }

    .bank-link {
        text-decoration: none;
        font-weight: 700;
        color: #667eea;
    }

    .bank-link:hover {
        color: #764ba2;
    }

    .inst {
        font-weight: 600;
        color: #555;
    }
</style>
{% endblock %}

{% block content %}
<div class="surface-card bank-list-card">
    <h2>All Banks</h2>
    <ul class="bank-list">
        {% for bank in banks %}
            <li>
                <a class="bank-link" href="{% url 'bank_details' bank.id %}">{{ bank.name }}</a>
                <span class="inst">{{ bank.institution_number }}</span>
            </li>
        {% empty %}
            <li>No banks found</li>
        {% endfor %}
    </ul>
</div>
{% endblock %}
